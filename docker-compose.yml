version: '3.9'

services:
  backend:
    image: audiovault:latest
    container_name: audiovault-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - ./data:/app/data
      - ${AUDIO_DIR:-/mnt/recordings}:/recordings
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DB_PATH=/app/data/audiovault.db
      - AUDIO_DIR=/recordings
      - STT_API_URL=${STT_API_URL:-}
      - STT_MODEL=${STT_MODEL:-istupakov/parakeet-tdt-0.6b-v3-onnx}
      - STT_POLL_INTERVAL_SECONDS=${STT_POLL_INTERVAL_SECONDS:-3}
      - STT_POLL_TIMEOUT_SECONDS=${STT_POLL_TIMEOUT_SECONDS:-300}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - LLM_DAILY_LIMIT=${LLM_DAILY_LIMIT:-5}
      - TRANSCRIPTION_CRON=${TRANSCRIPTION_CRON:-0 4 * * *}
      - LLM_POLL_INTERVAL=${LLM_POLL_INTERVAL:-30}
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

